http:
  routers:
    clawloops_web:
      rule: "Host(`clawloops.192.168.0.102.nip.io`) || Host(`192.168.0.102`)"
      entryPoints:
        - web
      service: clawloops_web

    clawloops_api:
      rule: "(Host(`clawloops.192.168.0.102.nip.io`) || Host(`192.168.0.102`)) && PathPrefix(`/api`)"
      entryPoints:
        - web
      service: clawloops_api

    clawloops_healthz:
      rule: "(Host(`clawloops.192.168.0.102.nip.io`) || Host(`192.168.0.102`)) && Path(`/healthz`)"
      entryPoints:
        - web
      service: clawloops_api

    clawloops_public:
      rule: "(Host(`clawloops.192.168.0.102.nip.io`) || Host(`192.168.0.102`)) && PathPrefix(`/public`)"
      entryPoints:
        - web
      service: clawloops_api

    runtime_manager:
      rule: "Host(`runtime-manager.192.168.0.102.nip.io`)"
      entryPoints:
        - web
      service: runtime_manager

  services:
    clawloops_web:
      loadBalancer:
        servers:
          - url: "http://clawloops-web:3000"
    clawloops_api:
      loadBalancer:
        servers:
          - url: "http://clawloops-api:8000"
    runtime_manager:
      loadBalancer:
        servers:
          - url: "http://runtime-manager:18080"




















